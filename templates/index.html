<!doctype html>

<html>
  <head>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    />

    <style>
      body {
        background: #f5f5f5;
      }

      .container {
        margin-top: 80px;

        max-width: 700px;
      }

      .search-box {
        background: white;

        padding: 40px;

        border-radius: 20px;

        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      h1 {
        text-align: center;

        margin-bottom: 30px;

        color: black;
      }

      button {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="search-box">
        <h1>실측 기반 남자 쇼핑몰 추천</h1>

        <form action="/search">
          <!-- 검색어 -->
          <input
            type="text"
            name="keyword"
            placeholder="반팔, 셔츠, 니트..."
            required
          />

          <!-- 어깨 -->
          <input
            type="number"
            name="shoulder"
            placeholder="원하는 어깨"
            required
          />

          <!-- 가슴 -->
          <input
            type="number"
            name="chest"
            placeholder="원하는 가슴"
            required
          />

          <!-- 총장 -->
          <input
            type="number"
            name="length"
            placeholder="원하는 총장"
            required
          />

          <button type="submit">추천받기</button>
        </form>
      </div>
    </div>
  </body>
</html>
